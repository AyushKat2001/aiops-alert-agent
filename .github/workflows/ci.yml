name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test and Validate
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Validate Prometheus configuration
      run: |
        docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/prometheus:/etc/prometheus \
            prom/prometheus:latest \
            check config /etc/prometheus/prometheus.yml
    
    - name: Validate Alert Rules
      run: |
        docker run --rm \
            --entrypoint promtool \
            -v ${{ github.workspace }}/prometheus:/etc/prometheus \
            prom/prometheus:latest \
            check rules /etc/prometheus/alerts.yml

    - name: Build Docker image
      run: |
        docker build -t aiops-agent .

    - name: Test agent health endpoint
      run: |
          docker run -d -p 5001:5001 \
            -e GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            -e SLACK_WEBHOOK_URL=${{ secrets.SLACK_WEBHOOK_URL }} \
            --name test-agent aiops-agent
          sleep 5
          echo "===== CONTAINER LOGS ====="
          docker logs test-agent

          echo "===== CURL TEST ====="
          curl -v http://localhost:5001/health

          docker stop test-agent